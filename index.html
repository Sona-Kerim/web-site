<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        nav {
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 60px;
        }

        nav .logo {
            color: #fff;
            font-size: 1.4rem;
            font-weight: bold;
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 24px;
        }

        nav ul li a {
            color: #ccc;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s;
        }

        nav ul li a:hover {
            color: #fff;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 24px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">MySite</a>
        <ul>
            <li><a href="#">Ana Səhifə</a></li>
            <li><a href="#">Haqqımızda</a></li>
            <li><a href="#">Xidmətlər</a></li>
            <li><a href="#">Əlaqə</a></li>
        </ul>
    </nav>

    <h1>Salam Fexreddin</h1>
    <p>sakdjkasjdkasjd</p>
</body>
</html>
